services:
  mysql:
    image: mysql:8
    container_name: mike-mysql
    ports:
      - 127.0.0.1:9020:3306
    volumes:
      - mysql:/var/lib/mysql:rw
    networks:
      - mike-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mike
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: mike-phpmyadmin
    ports:
      - 127.0.0.1:9021:80
    networks:
      - mike-mysql
    environment:
      PMA_HOST: "mike-mysql"
    restart: always

volumes:
  mysql:
    driver: local

networks:
  mike-mysql:
    driver: bridge
